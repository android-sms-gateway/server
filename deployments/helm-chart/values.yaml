# Default values for sms-gateway
# This is a YAML-formatted file
replicaCount: 1

image:
  repository: ghcr.io/android-sms-gateway/server
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podSecurityContext: {}
securityContext:
  {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 3000
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations:
    {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: sms-gateway.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: sms-gateway-tls
  #    hosts:
  #      - sms-gateway.local

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

# Database configuration
database:
  host: db
  port: 3306
  user: sms
  password: ""
  name: sms
  # Set to true to deploy a MariaDB instance with the chart
  deployInternal: true
  mariadb:
    image:
      repository: mariadb
      tag: lts
    rootPassword: ""
    persistence:
      enabled: true
      size: 8Gi

# Gateway configuration
gateway:
  mode: "private"
  privateToken: ""
  fcmKey: ""
  configPath: "/app/config.yml"

# Environment variables
env:
  {}
  # DEBUG: ""
  # HTTP__LISTEN: "0.0.0.0:3000"
